# ═══════════════════════════════════════════════════════════════
# Master List Fixture Secret
# ═══════════════════════════════════════════════════════════════
# Holds the binary Master List fixture files (CMS/PKCS#7 format).
# - masterlist_mock.bin : Synthetic mock Master List (safe for CI / public repos)
# - masterlist_es.bin   : Real Spanish Master List (staging only)
#
# HOW TO POPULATE:
#   The fixture binaries live in deployment/fixtures/ and are committed
#   to the staging branch. Create the Secret from that directory:
#
#   kubectl create secret generic prt-simulator-fixture \
#     --namespace prt-simulator \
#     --from-file=masterlist_mock.bin=deployment/fixtures/masterlist_mock.bin \
#     --from-file=masterlist_es.bin=deployment/fixtures/masterlist_es.bin
#
# The files are mounted at /data/fixtures/ inside the pod.
# The active fixture is selected by simulator.download.fixture-file in configmap.yaml.
#
# NOTE: Do NOT use `kubectl apply -f secret-fixture.yaml` to set fixture data —
# this manifest is kept in git as documentation only (data fields are intentionally empty).
# Always create/update the Secret imperatively from deployment/fixtures/.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: prt-simulator-fixture
  namespace: prt-simulator
  labels:
    app.kubernetes.io/name: prt-services-simulator
    app.kubernetes.io/component: fixture
type: Opaque
data:
  # Populated imperatively — see instructions above.
  masterlist_mock.bin: ""
  masterlist_es.bin: ""

