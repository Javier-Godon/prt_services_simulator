# ═══════════════════════════════════════════════════════════════
# ml-sample Secret
# ═══════════════════════════════════════════════════════════════
# Holds the binary ml_sample.bin fixture (CMS/PKCS#7 Master List).
#
# HOW TO POPULATE:
#   kubectl create secret generic prt-simulator-fixture \
#     --namespace prt-simulator \
#     --from-file=ml_sample.bin=/path/to/your/ml_sample.bin
#
# The file is mounted at /data/fixtures/ml_sample.bin inside the pod,
# which matches simulator.download.fixture-file in configmap.yaml.
#
# The placeholder below keeps the manifest valid for git.
# Replace it with your actual file using the kubectl command above,
# or use `kubectl apply` after creating the secret imperatively.
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: prt-simulator-fixture
  namespace: prt-simulator
  labels:
    app.kubernetes.io/name: prt-services-simulator
    app.kubernetes.io/component: fixture
type: Opaque
data:
  # Base64-encoded content of ml_sample.bin.
  # Replace with: base64 -w0 /path/to/ml_sample.bin
  # Example (synthetic placeholder — replace before deploying):
  ml_sample.bin: 

